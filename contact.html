        <h2 class="section-title">Hubungi Saya</h2>
        
        <div style="max-width: 500px; margin: auto;">
            <p style="text-align: center; margin-bottom: 30px; color: #7f8c8d;">
                Punya pertanyaan atau ingin diskusi tentang project? Silakan isi formulir di bawah ini.
            </p>
            
            <form action="simpan.php" method="POST" style="display: flex; flex-direction: column; gap: 15px;">
                <input type="text" name="nama" placeholder="Nama Anda" required

                <textarea name="pesan" placeholder="Tulis pesan atau pertanyaan kamu di sini..." rows="5" required 
                          style="padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-family: 'Poppins', sans-serif; resize: vertical;"></textarea>
                
                <button type="submit" class="btn-primary" 
                        style="display: flex; align-items: center; justify-content: center; padding: 15px; cursor: pointer; border: none; width: 100%;">
                    Kirim Pesan
                </button>
            </form>
